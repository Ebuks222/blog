<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Security Connect Blog — Admin</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Serif:ital,wght@0,500;0,600&family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #f5f3f0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }
        
        .admin-wrapper {
            background: #ffffff;
            padding: 48px 40px 40px;
            border-radius: 8px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 4px 24px rgba(26, 26, 26, 0.06);
            border-left: 4px solid #8b1a2b;
            text-align: center;
        }
        
        .admin-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 6px;
        }
        
        .admin-logo .icon {
            width: 40px;
            height: 40px;
            background: #8b1a2b;
            color: #ffffff;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 0.5px;
            font-family: 'Inter', sans-serif;
        }
        
        .admin-logo .text {
            font-size: 1.15rem;
            font-weight: 600;
            color: #1a1a1a;
            letter-spacing: -0.02em;
            font-family: 'IBM Plex Serif', serif;
        }
        
        .admin-logo .text span {
            font-weight: 300;
            color: #6b6b6b;
        }
        
        .admin-wrapper h1 {
            font-size: 1.4rem;
            font-weight: 600;
            margin: 20px 0 6px;
            color: #1a1a1a;
            font-family: 'IBM Plex Serif', serif;
        }
        
        .admin-wrapper .sub {
            color: #5a5a5a;
            font-size: 0.9rem;
            font-weight: 300;
            margin-bottom: 28px;
            line-height: 1.6;
        }
        
        .admin-wrapper .cms-container {
            border: 1px solid rgba(26, 26, 26, 0.06);
            border-radius: 4px;
            overflow: hidden;
            min-height: 420px;
            background: #ffffff;
        }
        
        .admin-wrapper .cms-container iframe {
            width: 100%;
            min-height: 500px;
            border: none;
        }
        
        .admin-footer {
            margin-top: 20px;
            font-size: 0.7rem;
            color: #8b8b8b;
            letter-spacing: 0.4px;
            text-transform: uppercase;
        }
        
        .admin-footer span {
            color: #8b1a2b;
        }
        
        @media (max-width: 500px) {
            .admin-wrapper {
                padding: 32px 20px 28px;
            }
            .admin-wrapper h1 {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="admin-wrapper">
        
        <div class="admin-logo">
            <div class="icon">SC</div>
            <div class="text">Security <span>Connect</span></div>
        </div>
        
        <h1>Content Management</h1>
        <p class="sub">Publish intelligence briefings,<br />geopolitical analysis, and strategic insights</p>
        
        <div class="cms-container">
            <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
        </div>
        
        <div class="admin-footer"><span>●</span> Secure &bull; Private &bull; Your content only <span>●</span></div>
        
    </div>
</body>
</html>
